<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Secure Login System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>🔐 Create Account</h1>
        
        <div class="form-section">
            <form id="registerForm">
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <input type="text" id="regUsername" placeholder="3-20 characters (letters, numbers, _)" required>
                    <small>Must be 3-20 characters with only letters, numbers, and underscores</small>
                </div>
                
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" placeholder="your@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" placeholder="Min 8 chars, uppercase, lowercase, number, special" required>
                    <small>Must contain: uppercase, lowercase, number, and special character (@$!%*?&)</small>
                </div>
                
                <div class="form-group">
                    <label for="regConfirmPassword">Confirm Password</label>
                    <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required>
                </div>
                
                <button type="submit" class="btn">Create Account</button>
            </form>
            
            <p>Already have an account? <a href="/">Login here</a></p>
        </div>
    </div>

    <script src="/js/main.js"></script>
</body>
</html>
